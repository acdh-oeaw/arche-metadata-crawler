name: test

on:
  push: ~

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.3, 8.4, 8.5]
    steps:
    - uses: actions/checkout@v6
    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        coverage: xdebug
      env:
        fail-fast: true
    - name: composer
      run: composer update
    - name: phpstan
      run: vendor/bin/phpstan analyze -l 6 src tests bin/*
    #- uses: mxschmitt/action-tmate@v3
    - name: integration tests
      run: |
        bin/arche-create-metadata-template /tmp all
        RET=1
        bin/arche-crawl-meta tests/meta/ /tmp/metadata.ttl /home/zozlak/roboty/ACDH/repo/metadata-crawler/tests/data https://id.acdh.oeaw.ac.at/tests || RET=0
        exit $RET
    - name: unit tests
      run: |
        mkdir -p build/logs
        XDEBUG_MODE=coverage vendor/bin/phpunit --display-all-issues
    - name: coveralls
      if: ${{ matrix.php == 8.5 }}
      run: |
        export COVERALLS_RUN_LOCALLY=1
        export COVERALLS_REPO_TOKEN=${{ secrets.coverallsToken }}
        rm -fR composer.json composer.lock vendor
        composer require php-coveralls/php-coveralls
        php vendor/bin/php-coveralls -v

